<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#6610f2"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="48" height="48" rx="13" fill="url(#bg)"/>

  <!-- Carteira – corpo -->
  <rect x="9" y="17" width="30" height="19" rx="3.5" fill="white" opacity="0.15" stroke="white" stroke-width="1.8"/>

  <!-- Carteira – aba superior -->
  <path d="M9 21.5 C9 19.6 10.6 18 12.5 18 L28 18 L28 21.5 Z" fill="white" opacity="0.25"/>

  <!-- Bolso da carteira (coin pocket) -->
  <rect x="30" y="22" width="9" height="9" rx="4.5" fill="white" opacity="0.9"/>

  <!-- Cifra $ no bolso -->
  <text x="34.5" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="#0d6efd">$</text>

  <!-- Seta de tendência positiva -->
  <polyline points="12,33 18,27 23,30 30,22" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="30,19 33,24 27,24" fill="white"/>
</svg>
