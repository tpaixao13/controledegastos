<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — FinFam</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-sm" style="width:360px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='images/logo.svg') }}" width="48" height="48">
        <h4 class="fw-bold mt-2">FinFam Admin</h4>
        <p class="text-muted small">Área restrita</p>
      </div>
      {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">E-mail</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">Entrar</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
