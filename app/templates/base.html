<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Controle de Gastos{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">
      <i class="bi bi-wallet2"></i> Controle de Gastos
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {{ 'active' if request.endpoint == 'main.index' }}" href="{{ url_for('main.index') }}">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {{ 'active' if request.blueprint == 'expenses' }}" href="{{ url_for('expenses.list') }}">
            <i class="bi bi-list-ul"></i> Despesas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {{ 'active' if request.blueprint == 'salaries' }}" href="{{ url_for('salaries.manage') }}">
            <i class="bi bi-cash-coin"></i> Salários
          </a>
        </li>
        <li class="nav-item ms-2">
          <a class="btn btn-warning btn-sm mt-1" href="{{ url_for('expenses.add') }}">
            <i class="bi bi-plus-lg"></i> Nova Despesa
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% include 'components/flash_messages.html' %}
  {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
